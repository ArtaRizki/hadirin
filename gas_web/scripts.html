<script>
  console.log("=== SCRIPTS.HTML LOADED ===");

  // ============================================
  // STATE MANAGEMENT
  // ============================================
  let currentUser = null;
  let chartInstance = null;
  let isAdminMode = false;
  let currentSchedule = null;
  let officeConfig = null;
  let rawTodayData = [];
  let allShifts = [];

  // ============================================
  // POLYFILLS
  // ============================================
  if (!String.prototype.padLeft) {
    String.prototype.padLeft = function (n, str) {
      return Array(n - String(this).length + 1).join(str || "0") + this;
    };
  }

  // ============================================
  // AUTHENTICATION
  // ============================================

  function handleLogin(btn) {
    console.log("handleLogin called", btn);

    const clientIdInput = document.getElementById("login-client-id");
    const userIdInput = document.getElementById("login-id");
    const pinInput = document.getElementById("login-password");

    if (!clientIdInput || !userIdInput) {
      console.error("Input elements not found");
      Swal.fire("Error", "Form tidak ditemukan. Refresh halaman.", "error");
      return;
    }

    const clientId = clientIdInput.value.trim();
    const userId = userIdInput.value.trim().toLowerCase();
    const pin = pinInput ? pinInput.value : "";

    console.log("Login attempt:", { clientId, userId, isAdminMode });

    if (!clientId || !userId) {
      Swal.fire("Peringatan", "Kode Instansi dan ID wajib diisi.", "warning");
      return;
    }

    if (btn) {
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Masuk...';
    }

    google.script.run
      .withSuccessHandler(function (response) {
        console.log("Login response:", response);

        if (btn) {
          btn.disabled = false;
          btn.innerText = "Masuk Dashboard";
        }

        if (response.success) {
          currentUser = response.user;
          setupUIForUser();
        } else {
          showLoginError(response.message || "Login gagal. Silakan coba lagi.");
        }
      })
      .withFailureHandler(function (err) {
        console.error("Login Failure:", err);

        if (btn) {
          btn.disabled = false;
          btn.innerText = "Masuk Dashboard";
        }

        showLoginError("Gagal terhubung ke server. Silakan coba lagi.");
      })
      .loginWeb(clientId, userId, isAdminMode ? pin : "BYPASS_PIN");
  }

  // Make globally accessible
  window.handleLogin = handleLogin;

  function showLoginError(msg) {
    const err = document.getElementById("login-error");
    if (err) {
      err.innerText = msg;
      err.style.display = "block";
      setTimeout(() => (err.style.display = "none"), 4000);
    }
  }

  function handleLogout() {
    console.log("handleLogout initiated");
    currentUser = null;
    localStorage.removeItem("sdit_user");
    document.body.classList.remove("is-loggedin"); // Hide mobile nav
    document.getElementById("app-container").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("login-id").value = "";
    document.getElementById("login-client-id").value = "";
    if (document.getElementById("login-password")) {
      document.getElementById("login-password").value = "";
    }
    isAdminMode = false;
    if (document.getElementById("admin-password-group")) {
      document.getElementById("admin-password-group").style.display = "none";
    }
    console.log("handleLogout completed");
  }

  window.handleLogout = handleLogout;

  function confirmLogout() {
    console.log("confirmLogout initiated");
    Swal.fire({
      title: "Konfirmasi Keluar",
      text: "Apakah Anda yakin ingin keluar dari dashboard?",
      icon: "question",
      showCancelButton: true,
      confirmButtonColor: "#005147",
      cancelButtonColor: "#ef4444",
      confirmButtonText: "Ya, Keluar",
      cancelButtonText: "Batal",
    }).then((result) => {
      if (result.isConfirmed) {
        handleLogout();
      }
    });
  }

  window.confirmLogout = confirmLogout;

  // ============================================
  // UI SETUP
  // ============================================

  function setupUIForUser() {
    if (!currentUser || !currentUser.id) {
      handleLogout();
      return;
    }

    console.log("Setting up UI for user:", currentUser);
    localStorage.setItem("sdit_user", JSON.stringify(currentUser));

    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-container").style.display = "flex";
    document.body.classList.add("is-loggedin"); // Show mobile nav

    document.getElementById("user-name").innerText = currentUser.nama;
    document.getElementById("user-id-display").innerHTML =
      "ID: " +
      currentUser.id +
      " <br><small style='color:var(--primary); font-weight:700;'>v3.7 Mobile</small>";

    const role =
      currentUser && currentUser.role ? currentUser.role.toLowerCase() : "";
    const isAdmin =
      role === "admin" || role === "superadmin" || role === "super admin";

    if (isAdmin) {
      document.getElementById("admin-section").style.display = "block";
      document.getElementById("member-action-section").style.display = "none";
      if (document.getElementById("admin-mobile-nav"))
        document.getElementById("admin-mobile-nav").style.display = "contents";
      if (document.getElementById("btn-re-register-face"))
        document.getElementById("btn-re-register-face").style.display = "none";
    } else {
      document.getElementById("admin-section").style.display = "none";
      document.getElementById("member-action-section").style.display = "block";
      if (document.getElementById("admin-mobile-nav"))
        document.getElementById("admin-mobile-nav").style.display = "none";
      if (document.getElementById("btn-re-register-face"))
        document.getElementById("btn-re-register-face").style.display = "flex";
    }

    const now = new Date();
    const monthVal =
      now.getFullYear() + "-" + String(now.getMonth() + 1).padLeft(2, "0");
    const mPicker = document.getElementById("shift-month-picker");
    if (mPicker) {
      mPicker.value = monthVal;
      mPicker.addEventListener("change", loadShiftData);
    }

    switchView("dashboard");

    const urlMsg = "<?!= msg ?>";
    if (urlMsg && urlMsg !== "null" && urlMsg !== "") {
      Swal.fire({
        icon: "success",
        title: "Berhasil",
        text: urlMsg,
        timer: 2000,
      });
      window.history.replaceState(
        {},
        document.title,
        window.location.href.split("&")[0].split("?")[0],
      );
    }
  }

  // ============================================
  // ROUTING
  // ============================================

  function switchView(viewId) {
    console.log("Switching to view:", viewId);

    // Update Sidebar (Desktop)
    const navItems = document.querySelectorAll(".nav-item");
    navItems.forEach((item) => {
      const onclickAttr = item.getAttribute("onclick") || "";
      if (onclickAttr.includes(`'${viewId}'`)) {
        item.classList.add("active");
      } else {
        item.classList.remove("active");
      }
    });

    // Update Bottom Nav (Mobile)
    const bottomNavItems = document.querySelectorAll(".bottom-nav-item");
    bottomNavItems.forEach((item) => {
      if (item.id === `m-nav-${viewId}`) {
        item.classList.add("active");
      } else {
        item.classList.remove("active");
      }
    });

    // Update Content
    const views = document.querySelectorAll(".content-view");
    views.forEach((v) => (v.style.display = "none"));
    const targetView = document.getElementById(`view-${viewId}`);
    if (targetView) targetView.style.display = "block";

    // Data Loaders
    if (viewId === "dashboard") loadDashboardData();
    if (viewId === "history") loadHistoryData();
    if (viewId === "members") loadMembersData();
    if (viewId === "approvals") loadApprovalsData();
    if (viewId === "settings") loadOfficeSettings();
    if (viewId === "today") loadTodayAttendanceData();
    if (viewId === "shifts") loadShiftData();
    if (viewId === "reports") initReportView();
    if (viewId === "kegiatan") loadKegiatanData();
    if (viewId === "pengajian") loadPengajianData();

    lucide.createIcons();
  }

  window.switchView = switchView;

  // ============================================
  // DATA FETCHING: DASHBOARD
  // ============================================

  function loadDashboardData() {
    if (!currentUser || !currentUser.clientId) {
      console.warn("loadDashboardData skipped: No clientId");
      return;
    }

    google.script.run
      .withSuccessHandler(function (response) {
        if (!response || response.error) {
          console.error(
            "Dashboard Error:",
            response ? response.error : "No response",
          );
          return;
        }

        const stats = response.stats || response;
        document.getElementById("stat-present").innerText = stats.present || 0;
        document.getElementById("stat-leave").innerText = stats.leave || 0;
        document.getElementById("stat-late").innerText = stats.late || 0;
        renderTrendChart(stats.trendLabels, stats.trendValues);

        if (response.schedule) {
          currentSchedule = response.schedule;
          officeConfig = response.office;
        }
      })
      .withFailureHandler(function (err) {
        console.error("Dashboard load failed:", err);
      })
      .getDashboardStats(currentUser.clientId, currentUser.id);
  }

  function renderTrendChart(labels, values) {
    const ctx = document.getElementById("attendanceChart");
    if (!ctx) return;

    const context = ctx.getContext("2d");
    if (chartInstance) chartInstance.destroy();

    const gradient = context.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, "rgba(124, 58, 237, 0.2)");
    gradient.addColorStop(1, "rgba(124, 58, 237, 0)");

    chartInstance = new Chart(context, {
      type: "line",
      data: {
        labels: labels || [],
        datasets: [
          {
            data: values || [],
            borderColor: "#7C3AED",
            backgroundColor: gradient,
            fill: true,
            tension: 0.4,
            borderWidth: 4,
            pointRadius: 6,
            pointBackgroundColor: "#fff",
            pointBorderColor: "#7C3AED",
            pointBorderWidth: 3,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: "#f1f5f9" },
            ticks: { font: { weight: 600 } },
          },
          x: {
            grid: { display: false },
            ticks: { font: { weight: 600 } },
          },
        },
      },
    });
  }

  // ============================================
  // DATA FETCHING: HISTORY
  // ============================================

  function loadHistoryData() {
    const tbody = document.getElementById("history-body");
    if (!tbody) return;

    tbody.innerHTML =
      '<tr><td colspan="5" style="text-align: center; padding: 40px;">Memuat data...</td></tr>';

    google.script.run
      .withFailureHandler(function (err) {
        tbody.innerHTML =
          '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #ef4444;">Gagal memuat data: ' +
          err.message +
          "</td></tr>";
      })
      .withSuccessHandler(function (history) {
        tbody.innerHTML = "";
        if (!history || history.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="5" style="text-align: center; padding: 40px;">Belum ada riwayat.</td></tr>';
          return;
        }

        if (history[0] && history[0].error) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px;"><div style="color: #ef4444; font-weight: 700;">${history[0].error}</div></td></tr>`;
          return;
        }

        history.forEach((log) => {
          const row = document.createElement("tr");
          const logStatus = log.status || "Tepat Waktu";
          let statusColor = "#10B981";
          if (logStatus === "Terlambat") statusColor = "#F59E0B";
          if (["Izin", "Sakit", "Cuti"].indexOf(logStatus) !== -1)
            statusColor = "#3B82F6";

          row.innerHTML = `
            <td data-label="Waktu">
              <div style="font-weight: 700;">${formatDate(log.waktu)}</div>
              <div style="font-size: 0.8rem; color: var(--text-muted);">${formatTime(log.waktu)}</div>
            </td>
            <td data-label="Tipe"><span class="badge-tipe">${log.tipe || "-"}</span></td>
            <td data-label="Status"><span style="color: ${statusColor}; font-weight: 800; font-size: 0.85rem;">${logStatus.toUpperCase()}</span></td>
            <td data-label="Tugas" style="font-size: 0.85rem; font-weight: 500; color: var(--text-muted);">${log.tugas || log.keterangan || "-"}</td>
            <td data-label="Aksi"><button class="btn" style="padding: 8px 16px; font-size: 0.75rem; border: 1px solid #E2E8F0; width: auto;" onclick="alert('Detail: ${(log.keterangan || "-").replace(/'/g, "\\'")}')">Detail</button></td>
          `;
          tbody.appendChild(row);
        });

        optimizeTablesForMobile();
      })
      .getAttendanceHistory(currentUser.clientId, currentUser.id);
  }

  // ============================================
  // ADMIN: DATA ANGGOTA
  // ============================================

  function loadMembersData() {
    const tbody = document.getElementById("members-body");
    if (!tbody) return;

    tbody.innerHTML =
      '<tr><td colspan="6" style="text-align: center; padding: 40px;">Mengambil data anggota...</td></tr>';

    google.script.run
      .withSuccessHandler(function (shiftRes) {
        allShifts = shiftRes.shifts || [];

        google.script.run
          .withSuccessHandler(function (response) {
            tbody.innerHTML = "";
            const members = response.message || response;

            members.forEach((m) => {
              const row = document.createElement("tr");
              const shiftOptions = allShifts
                .map(
                  (s) =>
                    `<option value="${s.id}" ${m.id_shift_default === s.id ? "selected" : ""}>${s.nama} (${s.id})</option>`,
                )
                .join("");

              row.innerHTML = `
                <td data-label="ID" style="font-weight: 700;">${m.id}</td>
                <td data-label="Nama" style="font-weight: 600;">${m.nama}</td>
                <td data-label="Bagian"><span class="badge-tipe">${m.bagian || "-"}</span></td>
                <td data-label="Enrollment">
                   <div style="display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; color: ${m.sudah_enroll ? "#10B981" : "#EF4444"}">
                     <i data-lucide="${m.sudah_enroll ? "smartphone" : "alert-circle"}" style="width: 14px;"></i>
                     ${m.sudah_enroll ? "Terdaftar" : "Belum Enroll"}
                   </div>
                </td>
                <td data-label="Shift">
                  <select class="glass-input" style="padding: 4px 8px; font-size: 0.8rem;" onchange="updateMemberShift('${m.id}', this.value)">
                    <option value="">Standar Kantor</option>
                    ${shiftOptions}
                  </select>
                </td>
                <td data-label="Aksi">
                  <div style="display: flex; gap: 8px;">
                    <button class="btn" style="padding: 8px; color: var(--primary); background: rgba(124, 58, 237, 0.05);" onclick='showMemberModal(${JSON.stringify(m)})'>
                      <i data-lucide="edit-3" style="width: 14px;"></i>
                    </button>
                    <button class="btn" onclick="handleResetDevice('${m.id}')" title="Reset Device"><i data-lucide="refresh-cw" style="width: 16px;"></i></button>
                    <button class="btn" onclick="handleDeleteMember('${m.id}')" style="color:#EF4444;" title="Hapus"><i data-lucide="trash-2" style="width: 16px;"></i></button>
                  </div>
                </td>
              `;
              tbody.appendChild(row);
            });

            lucide.createIcons();
            optimizeTablesForMobile();
          })
          .handleGetAllAnggota({ client_id: currentUser.clientId });
      })
      .getShiftList(currentUser.clientId);
  }

  function updateMemberShift(targetId, shiftId) {
    showOverlay("Memperbarui Shift Default...");
    google.script.run
      .withSuccessHandler(function (res) {
        hideOverlay();
        if (res.code === 200 || res.success) {
          Swal.fire({
            icon: "success",
            title: "Berhasil",
            text: "Shift default diperbarui.",
            timer: 1500,
          });
        } else {
          Swal.fire("Gagal", res.message || "Gagal memperbarui.", "error");
          loadMembersData();
        }
      })
      .updateDefaultShift(currentUser.clientId, targetId, shiftId);
  }

  window.updateMemberShift = updateMemberShift;

  // ============================================
  // ADMIN: TODAY'S ATTENDANCE
  // ============================================

  function loadTodayAttendanceData() {
    const body = document.getElementById("today-body");
    if (!body) return;

    body.innerHTML =
      '<tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-muted);">Memuat data absensi...</td></tr>';

    google.script.run
      .withSuccessHandler(function (response) {
        rawTodayData = response || [];
        renderTodayTable(rawTodayData);
        updateTodaySummary(rawTodayData);
      })
      .getTodayAttendanceAdmin(currentUser.clientId);
  }

  function renderTodayTable(data) {
    const body = document.getElementById("today-body");
    if (!body) return;

    body.innerHTML = "";
    data.forEach((item) => {
      const row = document.createElement("tr");
      const status = item.status_absen || "Belum Absen";
      let badgeClass = "badge-neutral";
      if (status === "Hadir") badgeClass = "badge-success";
      if (status === "Terlambat") badgeClass = "badge-warning";
      if (status === "Belum Absen") badgeClass = "badge-danger";
      if (["Izin", "Sakit", "Cuti"].indexOf(status) !== -1)
        badgeClass = "badge-info";

      row.innerHTML = `
        <td data-label="Anggota"><div style="font-weight: 700;">${item.nama}</div><div style="font-size: 0.75rem; color: var(--text-muted);">${item.id}</div></td>
        <td data-label="Bagian">${item.bagian}</td>
        <td data-label="Masuk"><div style="font-weight: 700;">${item.masuk || "-"}</div><small>${item.status_masuk || ""}</small></td>
        <td data-label="Pulang"><div style="font-weight: 700;">${item.pulang || "-"}</div><small>${item.status_pulang || ""}</small></td>
        <td data-label="Status"><span class="badge ${badgeClass}">${status}</span></td>
      `;
      body.appendChild(row);
    });

    optimizeTablesForMobile();
  }

  function updateTodaySummary(data) {
    let h = 0,
      t = 0,
      b = 0,
      i = 0;
    data.forEach((item) => {
      const s = item.status_absen || "Belum Absen";
      if (s === "Hadir") h++;
      else if (s === "Terlambat") t++;
      else if (s === "Belum Absen") b++;
      else i++;
    });

    const hEl = document.getElementById("today-h-count");
    const tEl = document.getElementById("today-t-count");
    const bEl = document.getElementById("today-b-count");
    const iEl = document.getElementById("today-i-count");

    if (hEl) hEl.innerText = h;
    if (tEl) tEl.innerText = t;
    if (bEl) bEl.innerText = b;
    if (iEl) iEl.innerText = i;
  }

  function applyTodayFilter() {
    const searchInput = document.getElementById("today-search");
    if (!searchInput) return;

    const query = searchInput.value.toLowerCase();
    const filtered = rawTodayData.filter(
      (item) =>
        (item.nama || "").toLowerCase().includes(query) ||
        (item.bagian || "").toLowerCase().includes(query) ||
        (item.id || "").toLowerCase().includes(query),
    );
    renderTodayTable(filtered);
  }

  window.applyTodayFilter = applyTodayFilter;

  // ============================================
  // ADMIN: APPROVALS
  // ============================================

  function loadApprovalsData() {
    const container = document.getElementById("approvals-list");
    if (!container) return;

    container.innerHTML =
      '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">Memuat pengajuan...</div>';

    google.script.run
      .withSuccessHandler(function (response) {
        container.innerHTML = "";
        const approvals = response.message || response;

        if (approvals.length === 0) {
          container.innerHTML =
            '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-muted);">Tidak ada pengajuan.</div>';
          return;
        }

        approvals.forEach((app) => {
          const card = document.createElement("div");
          card.className = "card glass";
          card.innerHTML = `
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
              <span class="badge-tipe">${app.tipe}</span>
              <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600;">${formatDate(app.waktu_pengajuan)}</span>
            </div>
            <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 4px;">${app.nama}</div>
            <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">ID: ${app.id_karyawan} | ${app.rentang}</div>
            <div style="background: #F8FAFC; padding: 16px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 24px; border: 1px dashed #E2E8F0;">
              <strong>Alasan:</strong><br>${app.alasan || "Tidak ada keterangan."}
            </div>
            ${app.tugas ? `<div style="background: #eff6ff; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 0.85rem;"><strong>Tugas:</strong> ${app.tugas}</div>` : ""}
            ${app.guru_pengganti && app.guru_pengganti !== "-" ? `<div style="background: #f0fdf4; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 0.85rem;"><strong>Guru Pengganti:</strong> ${app.guru_pengganti}</div>` : ""}
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
              <button class="btn" style="color: #EF4444;" onclick="updateStatus('${app.row_index}', 'Ditolak')">Tolak</button>
              <button class="btn btn-primary" onclick="updateStatus('${app.row_index}', 'Disetujui')">Setujui</button>
            </div>
          `;
          container.appendChild(card);
        });
      })
      .handleGetAllApprovals({ client_id: currentUser.clientId });
  }

  function updateStatus(rowIndex, newStatus) {
    google.script.run
      .withSuccessHandler(() => {
        Swal.fire({
          icon: "success",
          title: "Berhasil",
          text: `Permohonan ${newStatus.toLowerCase()}.`,
          timer: 1500,
        });
        loadApprovalsData();
      })
      .handleUpdateLeaveStatus({
        client_id: currentUser.clientId,
        row_index: rowIndex,
        new_status: newStatus,
      });
  }

  window.updateStatus = updateStatus;

  // ============================================
  // ADMIN: SHIFT & PLOTTING
  // ============================================

  function switchShiftTab(event, tab) {
    document
      .querySelectorAll(".tab-btn")
      .forEach((b) => b.classList.remove("active"));
    if (event) event.currentTarget.classList.add("active");

    const calTab = document.getElementById("shift-tab-calendar");
    const listTab = document.getElementById("shift-tab-list");

    if (calTab) calTab.style.display = tab === "calendar" ? "block" : "none";
    if (listTab) listTab.style.display = tab === "list" ? "block" : "none";
  }

  window.switchShiftTab = switchShiftTab;

  function loadShiftData() {
    const monthPicker = document.getElementById("shift-month-picker");
    if (!monthPicker || !monthPicker.value) return;

    const [year, month] = monthPicker.value.split("-");

    google.script.run
      .withSuccessHandler(function (response) {
        if (response.success) {
          allShifts = response.shifts;
          renderPlottingCalendar(year, month, response.plotting);
          renderShiftList(allShifts);
        }
      })
      .getShiftSettings(currentUser.clientId, year, month);
  }

  function renderPlottingCalendar(year, month, plotting) {
    const head = document.getElementById("shift-calendar-head");
    const body = document.getElementById("shift-calendar-body");
    if (!head || !body) return;

    const daysInMonth = new Date(year, month, 0).getDate();

    let headHtml = '<tr><th class="sticky-col">Anggota</th>';
    for (let d = 1; d <= daysInMonth; d++) headHtml += `<th>${d}</th>`;
    headHtml += "</tr>";
    head.innerHTML = headHtml;

    google.script.run
      .withSuccessHandler((members) => {
        body.innerHTML = "";
        members.forEach((m) => {
          let rowHtml = `<tr data-id="${m.id}"><td class="sticky-col"><strong>${m.nama}</strong><br><small>${m.id}</small></td>`;
          for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${month.toString().padLeft(2, "0")}-${d.toString().padLeft(2, "0")}`;
            const key = `${dateStr}_${m.id}`;

  let currentTipeAbsen = "Masuk";

  async function initFaceAI() {
    const MODEL_URL = "https://justadudewhohacks.github.io/face-api.js/models";
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
  }

  function handleWebAbsen(tipe) {
    currentTipeAbsen = tipe;
    document.getElementById("camera-input").click();
  }

  window.handleWebAbsen = handleWebAbsen;

  document.addEventListener("DOMContentLoaded", function () {
    const cameraInput = document.getElementById("camera-input");
    if (cameraInput) {
      cameraInput.addEventListener("change", async function (e) {
        const file = e.target.files[0];
        if (!file) return;

        const overlay = document.getElementById("processing-overlay");
        overlay.style.display = "flex";

        try {
          await initFaceAI();
          const img = await faceapi.bufferToImage(file);
          const detection = await faceapi
            .detectSingleFace(
              img,
              new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }),
            )
            .withFaceLandmarks()
            .withFaceDescriptor();

          if (!detection) throw new Error("Wajah tidak terdeteksi.");

          if (currentUser.faceWeb) {
            let parsed;
            try {
              parsed = JSON.parse(currentUser.faceWeb);
            } catch (e) {
              throw new Error("Data wajah tidak valid. Silakan hubungi admin.");
            }

            if (!Array.isArray(parsed) || parsed.length !== 128) {
              throw new Error("Format wajah lama tidak didukung. Silakan daftar ulang wajah Anda.");
            }

            const savedDesc = new Float32Array(parsed);
            const faceMatcher = new faceapi.FaceMatcher(
              new faceapi.LabeledFaceDescriptors(currentUser.id, [savedDesc]),
              0.6,
            );
            const match = faceMatcher.findBestMatch(detection.descriptor);

            if (match.label === "unknown")
              throw new Error("Wajah Tidak Cocok!");

            if (!navigator.geolocation) {
              overlay.style.display = "none";
              Swal.fire("Error", "Browser Anda tidak mendukung fitur lokasi GPS.", "error");
              return;
            }

            const sendAbsen = (pos) => {
              const canvas = document.createElement("canvas");
              canvas.width = 600;
              canvas.height = 800;
              canvas.getContext("2d").drawImage(img, 0, 0, 600, 800);
              const base64Photo = canvas.toDataURL("image/jpeg", 0.7).split(",")[1];
              const tugasVal = document.getElementById("absen-tugas").value;
              const latLong = pos ? `${pos.coords.latitude}, ${pos.coords.longitude}` : "GPS_OFF";

              google.script.run
                .withSuccessHandler((res) => {
                  overlay.style.display = "none";
                  if (res.code === 200) {
                    Swal.fire("Berhasil!", res.message, "success").then(() => loadDashboardData());
                  } else {
                    Swal.fire("Gagal", res.message, "error");
                  }
                })
                .submitAbsenWeb({
                  api_token: "sdit-palu",
                  client_id: currentUser.clientId,
                  action: "absen",
                  id_karyawan: currentUser.id,
                  tipe_absen: currentTipeAbsen,
                  lat_long: latLong,
                  foto_base64: base64Photo,
                  tugas: tugasVal,
                });
            };

            // Tahap 1: Coba GPS Akurasi Tinggi
            navigator.geolocation.getCurrentPosition(
              (pos) => sendAbsen(pos),
              (err) => {
                console.warn("High accuracy GPS failed, trying network location...", err);
                // Tahap 2: Coba Akurasi Rendah (Cell/WiFi - Lebih Cepat & Hemat Baterai)
                navigator.geolocation.getCurrentPosition(
                  (pos) => sendAbsen(pos),
                  (err2) => {
                    // Tahap 3: Coba IP Geolocation (Non-GPS) sebagai cadangan terakhir
                    fetch('https://ipapi.co/json/')
                      .then(response => response.json())
                      .then(data => {
                        if (data.latitude && data.longitude) {
                          sendAbsen({ coords: { latitude: data.latitude, longitude: data.longitude, accuracy: 'IP' } });
                        } else {
                          throw new Error("Invalid IP Data");
                        }
                      })
                      .catch(() => {
                        overlay.style.display = "none";
                        Swal.fire({
                          title: "GPS Gagal",
                          text: "Gagal mendapatkan lokasi. Tetap absen tanpa verifikasi jarak (GPS)?",
                          icon: "warning",
                          showCancelButton: true,
                          confirmButtonText: "Ya, Absen Tanpa GPS",
                          cancelButtonText: "Batal",
                          confirmButtonColor: "#005147",
                        }).then((result) => {
                          if (result.isConfirmed) {
                            overlay.style.display = "flex";
                            sendAbsen(null); // Kirim tanpa koordinat
                          }
                        });
                      });
                  },
                  { enableHighAccuracy: false, timeout: 5000 }
                );
              },
              { enableHighAccuracy: true, timeout: 8000 }
            );
          } else {
            if (confirm("Wajah belum terdaftar. Daftarkan sekarang?")) {
              const descriptor = JSON.stringify(
                Array.from(detection.descriptor),
              );
              google.script.run
                .withSuccessHandler((res) => {
                  overlay.style.display = "none";
                  if (res.success) {
                    currentUser.faceWeb = descriptor;
                    localStorage.setItem(
                      "sdit_user",
                      JSON.stringify(currentUser),
                    );
                    Swal.fire(
                      "Berhasil!",
                      "Wajah terdaftar. Silakan absen ulang.",
                      "success",
                    );
                  }
                })
                .registerFaceWeb(
                  currentUser.clientId,
                  currentUser.id,
                  descriptor,
                );
            } else {
              overlay.style.display = "none";
            }
          }
        } catch (err) {
          overlay.style.display = "none";
          Swal.fire("Error", err.message, "error");
        }
      });
    }
  });

  function handleLeaveSubmit(btn) {

    const task = document.getElementById("leave-task").value;

  }

  // ============================================
  // MOBILE RESPONSIVE ENHANCEMENTS
  // ============================================

  function optimizeTablesForMobile() {
    if (window.innerWidth <= 768) {
      document.querySelectorAll("table").forEach((table) => {
        if (
          !table.classList.contains("plotting-table") &&
          !table.classList.contains("mobile-card-table")
        ) {
          table.classList.add("mobile-card-table");
        }
      });
    }
  }

  function detectMobile() {
    const isMobile = window.innerWidth <= 768;
    document.body.classList.toggle("is-mobile", isMobile);

    if (isMobile) {
      optimizeTablesForMobile();
    }
  }

  function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
      const later = () => {
        clearTimeout(timeout);
        func(...args);
      };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  }

  // Prevent zoom on double-tap (iOS)
  let lastTouchEnd = 0;
  document.addEventListener(
    "touchend",
    function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    },
    false,
  );

  // ============================================
  // EVENT LISTENERS
  // ============================================

  document.addEventListener("DOMContentLoaded", function () {
    console.log("DOM Content Loaded - Setting up event listeners");

    // Admin trigger
    const loginIdInput = document.getElementById("login-id");
    const passGroup = document.getElementById("admin-password-group");

    if (loginIdInput && passGroup) {
      loginIdInput.addEventListener("input", function (e) {
        if (e.target.value.toUpperCase() === "ADMIN") {
          passGroup.style.display = "block";
          isAdminMode = true;
          console.log("Admin mode activated");
        } else {
          passGroup.style.display = "none";
          isAdminMode = false;
        }
      });
    }

    // Enter key support for login
    const loginInputs = document.querySelectorAll("#login-screen input");
    loginInputs.forEach((input) => {
      input.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          const loginBtn = document.querySelector("#login-screen .btn-primary");
          if (loginBtn) handleLogin(loginBtn);
        }
      });
    });

    // Check for saved session
    const saved = localStorage.getItem("sdit_user");
    if (saved) {
      try {
        currentUser = JSON.parse(saved);
        setupUIForUser();
      } catch (e) {
        console.error("Failed to parse saved user:", e);
        localStorage.removeItem("sdit_user");
      }
    }

    // Mobile detection
    detectMobile();
    window.addEventListener("resize", debounce(detectMobile, 250));

    // Smooth scroll
    if ("scrollBehavior" in document.documentElement.style) {
      document.documentElement.style.scrollBehavior = "smooth";
    }

    // Initialize Lucide icons
    if (typeof lucide !== "undefined") {
      lucide.createIcons();
    }
  });

  console.log("=== SCRIPTS.HTML FULLY LOADED ===");
  console.log("handleLogin available:", typeof handleLogin);
  console.log("window.handleLogin available:", typeof window.handleLogin);
</script>
