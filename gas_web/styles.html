<style>
  :root {
    --primary-gradient: linear-gradient(135deg, #4F46E5, #7C3AED);
    --secondary-gradient: linear-gradient(135deg, #10B981, #059669);
    --bg-color: #F4F6FF;
    --text-main: #0F172A;
    --text-muted: #64748B;
    --white: #FFFFFF;
    --glass-bg: rgba(255, 255, 255, 0.7);
    --glass-border: rgba(255, 255, 255, 0.3);
    --sidebar-width: 260px;
    --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-main);
    overflow: hidden; /* We handle scrolling in main content */
    height: 100vh;
  }

  /* UTILITIES */
  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--primary-gradient);
    color: white;
    box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 20px -3px rgba(79, 70, 229, 0.4);
  }

  /* LAYOUT */
  #app-container {
    display: flex;
    height: 100vh;
    animation: fadeIn 0.5s ease-out;
  }

  #sidebar {
    width: var(--sidebar-width);
    height: 100%;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    z-index: 10;
  }

  #main-content {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
    position: relative;
  }

  /* COMPONENTS */
  .nav-item {
    padding: 14px 20px;
    margin-bottom: 8px;
    border-radius: 12px;
    color: var(--text-muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-item:hover {
    background: rgba(255, 255, 255, 0.5);
    color: var(--text-main);
  }

  .nav-item.active {
    background: var(--primary-gradient);
    color: white;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  }

  .card {
    background: white;
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(0,0,0,0.03);
  }

  .stat-card {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stat-value {
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: -1px;
  }

  .stat-label {
    text-transform: uppercase;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  /* ANIMATIONS */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* TABLES */
  .table-container {
    overflow-x: auto;
    width: 100%;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  th {
    text-align: left;
    padding: 16px;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 700;
    text-transform: uppercase;
    border-bottom: 2px solid var(--bg-color);
  }

  td {
    padding: 16px;
    border-bottom: 1px solid var(--bg-color);
    font-size: 0.95rem;
  }

  tr:last-child td {
    border-bottom: none;
  }

  /* LOGIN OVERLAY */
  #login-screen {
    position: fixed;
    inset: 0;
    background: var(--bg-color);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    background-image: 
      radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.1) 0, transparent 50%),
      radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.1) 0, transparent 50%);
  }

  .login-card {
    width: 100%;
    max-width: 400px;
    padding: 40px;
    text-align: center;
  }

  .logo {
    font-size: 2rem;
    font-weight: 900;
    background: var(--primary-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 30px;
  }

  .input-group {
    margin-bottom: 20px;
    text-align: left;
  }

  .input-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 0.9rem;
  }

  .input-group input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #E2E8F0;
    transition: all 0.2s;
  }

  .input-group input:focus {
    outline: none;
    border-color: #4F46E5;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    #sidebar {
      display: none; /* simple drawer logic could be added later */
    }
  }
</style>
