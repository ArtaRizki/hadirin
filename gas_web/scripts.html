<script>
  // STATE MANAGEMENT
  let currentUser = null;
  let chartInstance = null;
  let isAdminMode = false;
  let currentSchedule = null;
  let officeConfig = null;
  let rawTodayData = [];
  let allShifts = [];

  // POLYFILLS
  if (!String.prototype.padLeft) {
    String.prototype.padLeft = function (n, str) {
      return Array(n - String(this).length + 1).join(str || '0') + this;
    };
  }

  // SECRET TRIGGER FOR ADMIN (Backdoor)
  document.addEventListener('DOMContentLoaded', function () {
    const loginIdInput = document.getElementById('login-id');
    const passGroup = document.getElementById('admin-password-group');

    if (loginIdInput) {
      loginIdInput.addEventListener('input', function (e) {
        if (e.target.value.toUpperCase() === 'ADMIN') {
          passGroup.style.display = 'block';
          isAdminMode = true;
        } else {
          passGroup.style.display = 'none';
          isAdminMode = false;
        }
      });
    }
  });

  // ROUTING
  function switchView(viewId) {
    // Update Sidebar (Desktop)
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      const oc = item.getAttribute('onclick') || "";
      if (oc.indexOf(`'${viewId}'`) !== -1) {
        item.classList.add('active');
        item.style.display = 'flex';
      } else {
        item.classList.remove('active');
      }
    });

    // Update Bottom Nav (Mobile)
    const bottomNavItems = document.querySelectorAll('.bottom-nav-item');
    bottomNavItems.forEach(item => {
      if (item.id === `m-nav-${viewId}`) {
        item.classList.add('active');
      } else {
        item.classList.remove('active');
      }
    });

    // Update Content
    const views = document.querySelectorAll('.content-view');
    views.forEach(v => v.style.display = 'none');
    document.getElementById(`view-${viewId}`).style.display = 'block';

    // Data Loaders
    if (viewId === 'dashboard') loadDashboardData();
    if (viewId === 'history') loadHistoryData();
    if (viewId === 'members') loadMembersData();
    if (viewId === 'approvals') loadApprovalsData();
    if (viewId === 'shifts') loadShiftData();
    if (viewId === 'reports') initReportView();
    if (viewId === 'settings') loadOfficeSettings();
    if (viewId === 'today') loadTodayAttendanceData();

    lucide.createIcons();
  }

  // AUTHENTICATION
  function handleLogin() {
    const clientId = document.getElementById('login-client-id').value.trim();
    const userId = document.getElementById('login-id').value.trim().toLowerCase();
    const pin = document.getElementById('login-password').value;
    const btn = event.currentTarget || event.target;

    if (!clientId || !userId) {
      alert("Kode Instansi dan ID wajib diisi.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span> Masuk...';

    google.script.run
      .withSuccessHandler(function (response) {
        btn.disabled = false;
        btn.innerText = 'Masuk Dashboard';

        if (response.success) {
          currentUser = response.user;
          setupUIForUser();
        } else {
          showLoginError(response.message);
        }
      })
      .withFailureHandler(function (err) {
        btn.disabled = false;
        btn.innerText = 'Masuk Dashboard';
        showLoginError("Gagal terhubung ke server.");
      })
      .loginWeb(clientId, userId, isAdminMode ? pin : "BYPASS_PIN");
  }

  function setupUIForUser() {
    localStorage.setItem('hadirin_user', JSON.stringify(currentUser));

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';

    document.getElementById('user-name').innerText = currentUser.nama;
    document.getElementById('user-id-display').innerHTML = "ID: " + currentUser.id + " <br><small style='color:var(--primary); font-weight:700;'>v3.5 Diagnostic Mode</small>";

    const role = (currentUser && currentUser.role) ? currentUser.role.toLowerCase() : "";
    const isAdmin = role === 'admin' || role === 'superadmin' || role === 'super admin';

    if (isAdmin) {
      document.getElementById('admin-section').style.display = 'block';
      document.getElementById('member-action-section').style.display = 'none';
      if (document.getElementById('admin-mobile-nav')) document.getElementById('admin-mobile-nav').style.display = 'contents';
      document.getElementById('btn-re-register-face').style.display = 'none';
    } else {
      document.getElementById('admin-section').style.display = 'none';
      document.getElementById('member-action-section').style.display = 'block';
      if (document.getElementById('admin-mobile-nav')) document.getElementById('admin-mobile-nav').style.display = 'none';
      document.getElementById('btn-re-register-face').style.display = 'flex';
    }

    const now = new Date();
    const monthVal = now.getFullYear() + "-" + String(now.getMonth() + 1).padLeft(2, '0');
    const mPicker = document.getElementById('shift-month-picker');
    if (mPicker) {
      mPicker.value = monthVal;
      mPicker.addEventListener('change', loadShiftData);
    }

    switchView('dashboard');

    const urlMsg = "<?!= msg ?>";
    if (urlMsg && urlMsg !== "null") {
      alert(urlMsg);
      window.history.replaceState({}, document.title, window.location.href.split('&')[0].split('?')[0]);
    }
  }

  function handleLogout() {
    currentUser = null;
    localStorage.removeItem('hadirin_user');
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-id').value = '';
    document.getElementById('login-password').value = '';
    isAdminMode = false;
    document.getElementById('admin-password-group').style.display = 'none';
  }

  document.addEventListener('DOMContentLoaded', function () {
    const saved = localStorage.getItem('hadirin_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      setupUIForUser();
    }
  });

  function showLoginError(msg) {
    const err = document.getElementById('login-error');
    err.innerText = msg;
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 4000);
  }

  // DATA FETCHING: DASHBOARD
  function loadDashboardData() {
    google.script.run
      .withSuccessHandler(function (response) {
        if (response.error) {
          console.error("Dashboard Error:", response.error);
          return;
        }

        const data = response.stats;
        document.getElementById('stat-present').innerText = data.present || 0;
        document.getElementById('stat-leave').innerText = data.leave || 0;
        document.getElementById('stat-late').innerText = data.late || 0;
        renderTrendChart(data.trendLabels, data.trendValues);

        currentSchedule = response.schedule;
        officeConfig = response.office;

        if (currentSchedule) {
          document.getElementById('today-schedule-card').style.display = 'flex';
          document.getElementById('display-shift-name').innerText = currentSchedule.shift_name;
          document.getElementById('display-shift-time').innerText = `${currentSchedule.masuk} - ${currentSchedule.pulang}`;
          const openEl = document.getElementById('display-shift-open');
          if (openEl) openEl.innerText = `Absen dibuka pukul: ${currentSchedule.jam_masuk_mulai || '--:--'}`;

          const statusEl = document.getElementById('display-shift-status');
          if (currentSchedule.is_off) {
            statusEl.innerText = "LIBUR";
            statusEl.style.color = "#94A3B8";
          } else {
            statusEl.innerText = "AKTIF";
            statusEl.style.color = "#10B981";
          }
        }
      })
      .getDashboardDataWeb(currentUser.clientId, currentUser.id);
  }

  // DATA FETCHING: TODAY'S ATTENDANCE (ADMIN)
  function loadTodayAttendanceData() {
    const body = document.getElementById('today-body');
    body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-muted);">Memuat data absensi...</td></tr>';

    google.script.run
      .withSuccessHandler(function (response) {
        if (response && response[0] && response[0].error) {
          body.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 40px; color: #ef4444;">${response[0].error}</td></tr>`;
          return;
        }

        rawTodayData = response || [];
        renderTodayTable(rawTodayData);
        updateTodaySummary(rawTodayData);
      })
      .withFailureHandler(function (err) {
        body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color: #ef4444;">Gagal mengambil data dari server.</td></tr>';
      })
      .getTodayAttendanceAdmin(currentUser.clientId);
  }

  function renderTodayTable(data) {
    const body = document.getElementById('today-body');
    body.innerHTML = '';

    if (data.length === 0) {
      body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-muted);">Tidak ada data anggota.</td></tr>';
      return;
    }

    data.forEach(item => {
      const row = document.createElement('tr');
      const status = item.status_absen || "Belum Absen";

      let badgeClass = "badge-neutral";
      if (status === "Hadir") badgeClass = "badge-success";
      if (status === "Terlambat") badgeClass = "badge-warning";
      if (status === "Belum Absen") badgeClass = "badge-danger";
      if (["Izin", "Sakit", "Cuti"].indexOf(status) !== -1) badgeClass = "badge-info";

      row.innerHTML = `
        <td>
          <div style="font-weight: 700;">${item.nama}</div>
          <div style="font-size: 0.75rem; color: var(--text-muted);">${item.id}</div>
        </td>
        <td>${item.bagian}</td>
        <td><div style="font-weight: 700;">${item.masuk || "-"}</div><small style="color:var(--text-muted)">${item.status_masuk || ""}</small></td>
        <td><div style="font-weight: 700;">${item.pulang || "-"}</div><small style="color:var(--text-muted)">${item.status_pulang || ""}</small></td>
        <td><span class="badge ${badgeClass}">${status}</span></td>
      `;
      body.appendChild(row);
    });
  }

  function updateTodaySummary(data) {
    let h = 0, t = 0, b = 0, i = 0;
    data.forEach(item => {
      const s = item.status_absen || "Belum Absen";
      if (s === "Hadir") h++;
      else if (s === "Terlambat") t++;
      else if (s === "Belum Absen") b++;
      else i++;
    });

    document.getElementById('today-h-count').innerText = h;
    document.getElementById('today-t-count').innerText = t;
    document.getElementById('today-b-count').innerText = b;
    document.getElementById('today-i-count').innerText = i;
  }

  function applyTodayFilter() {
    const query = document.getElementById('today-search').value.toLowerCase();
    const filtered = rawTodayData.filter(item => {
      return (item.nama || "").toLowerCase().includes(query) ||
        (item.bagian || "").toLowerCase().includes(query) ||
        (item.id || "").toLowerCase().includes(query);
    });
    renderTodayTable(filtered);
  }

  function renderTrendChart(labels, values) {
    const ctx = document.getElementById('attendanceChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();

    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(124, 58, 237, 0.2)');
    gradient.addColorStop(1, 'rgba(124, 58, 237, 0)');

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels || [],
        datasets: [{
          data: values || [],
          borderColor: '#7C3AED',
          backgroundColor: gradient,
          fill: true,
          tension: 0.4,
          borderWidth: 4,
          pointRadius: 6,
          pointBackgroundColor: '#fff',
          pointBorderColor: '#7C3AED',
          pointBorderWidth: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { weight: 600 } } },
          x: { grid: { display: false }, ticks: { font: { weight: 600 } } }
        }
      }
    });
  }

  // DATA FETCHING: HISTORY
  function loadHistoryData() {
    const tbody = document.getElementById('history-body');
    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px;">Memuat data...</td></tr>';

    google.script.run
      .withFailureHandler(function (err) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px; color: #ef4444;">Gagal memuat data: ' + err.message + '</td></tr>';
      })
      .withSuccessHandler(function (history) {
        tbody.innerHTML = '';
        if (!history || history.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px;">Belum ada riwayat.</td></tr>';
          return;
        }

        if (history[0] && history[0].error) {
          tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; padding: 20px;"><div style="color: #ef4444; font-weight: 700;">${history[0].error}</div></td></tr>`;
          return;
        }

        history.forEach(log => {
          const row = document.createElement('tr');
          const logStatus = log.status || "Tepat Waktu";
          const statusSlug = logStatus.toLowerCase().replace(/\s+/g, '');
          let statusClass = "status-tepat";
          if (statusSlug.startsWith('tl')) statusClass = "status-" + statusSlug;
          if (statusSlug.startsWith('psw')) statusClass = "status-" + statusSlug;

          row.innerHTML = `
            <td>
              <div style="font-weight: 700;">${formatDate(log.waktu)}</div>
              <div style="font-size: 0.8rem; color: var(--text-muted);">${formatTime(log.waktu)}</div>
            </td>
            <td><span class="badge-tipe">${log.tipe || "-"}</span></td>
            <td><span class="${statusClass}" style="font-weight: 800; font-size: 0.85rem;">${logStatus.toUpperCase()}</span></td>
            <td><button class="btn" style="padding: 8px 16px; font-size: 0.75rem; border: 1px solid #E2E8F0; width: auto;" onclick="alert('Detail: ${log.keterangan || '-'}')">Detail</button></td>
          `;
          tbody.appendChild(row);
        });
      })
      .getAttendanceHistory(currentUser.clientId, currentUser.id);
  }

  // ADMIN: DATA ANGGOTA
  function loadMembersData() {
    const tbody = document.getElementById('members-body');
    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">Mengambil data anggota...</td></tr>';

    // Fetch shifts first to populate dropdowns
    google.script.run
      .withSuccessHandler(function (shiftRes) {
        allShifts = (shiftRes.message && shiftRes.message.shifts) ? shiftRes.message.shifts : (shiftRes.shifts || []);

        google.script.run
          .withSuccessHandler(function (response) {
            tbody.innerHTML = '';
            const members = response.message || response;
            members.forEach(m => {
              const row = document.createElement('tr');
              const shiftOptions = allShifts.map(s =>
                `<option value="${s.id}" ${m.id_shift_default === s.id ? 'selected' : ''}>${s.nama} (${s.id})</option>`
              ).join('');

              row.innerHTML = `
                <td style="font-weight: 700;">${m.id}</td>
                <td style="font-weight: 600;">${m.nama}</td>
                <td><span class="badge-tipe">${m.bagian || m.divisi || '-'}</span></td>
                <td>
                   <div style="display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; color: ${m.sudah_enroll ? '#10B981' : '#EF4444'}">
                     <i data-lucide="${m.sudah_enroll ? 'smartphone' : 'alert-circle'}" style="width: 14px;"></i>
                     ${m.sudah_enroll ? 'Terdaftar' : 'Belum Enroll'}
                   </div>
                </td>
                <td>
                  <select class="glass-input" style="padding: 4px 8px; font-size: 0.8rem;" onchange="updateMemberShift('${m.id}', this.value)">
                    <option value="">Standar Kantor</option>
                    ${shiftOptions}
                  </select>
                </td>
                <td>
                  <div style="display: flex; gap: 8px;">
                    <button class="btn" onclick="window.open('https://wa.me/${m.no_hp || ''}', '_blank')"><i data-lucide="message-circle" style="width: 16px;"></i></button>
                    <button class="btn" onclick="handleResetDevice('${m.id}')"><i data-lucide="refresh-cw" style="width: 16px;"></i></button>
                    <button class="btn" onclick="handleDeleteMember('${m.id}')" style="color:#EF4444;"><i data-lucide="trash-2" style="width: 16px;"></i></button>
                  </div>
                </td>
              `;
              tbody.appendChild(row);
            });
            lucide.createIcons();
          })
          .handleGetAllAnggota({ client_id: currentUser.clientId });
      })
      .getShiftList(currentUser.clientId);
  }

  function updateMemberShift(targetId, shiftId) {
    showOverlay('Memperbarui Shift Default...');
    google.script.run
      .withSuccessHandler(function (res) {
        hideOverlay();
        if (res.code === 200 || res.success) {
          Swal.fire({ icon: 'success', title: 'Berhasil', text: 'Shift default diperbarui.', timer: 1500 });
        } else {
          Swal.fire('Gagal', res.message || 'Gagal memperbarui.', 'error');
          loadMembersData();
        }
      })
      .updateDefaultShift(currentUser.clientId, targetId, shiftId);
  }

  // ADMIN: APPROVALS
  function loadApprovalsData() {
    const container = document.getElementById('approvals-list');
    container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">Memuat pengajuan...</div>';

    google.script.run
      .withSuccessHandler(function (response) {
        container.innerHTML = '';
        const approvals = response.message || response;
        if (approvals.length === 0) {
          container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--text-muted);">Tidak ada pengajuan. 🎈</div>';
          return;
        }

        approvals.forEach(app => {
          const card = document.createElement('div');
          card.className = 'card glass';
          card.innerHTML = `
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
              <span class="badge-tipe">${app.tipe}</span>
              <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600;">${formatDate(app.waktu_pengajuan)}</span>
            </div>
            <div style="font-weight: 800; font-size: 1.1rem; margin-bottom: 4px;">${app.nama}</div>
            <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">ID: ${app.id_karyawan} | ${app.rentang}</div>
            <div style="background: #F8FAFC; padding: 16px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 24px; border: 1px dashed #E2E8F0;">
              <strong>Alasan:</strong><br>${app.alasan || 'Tidak ada keterangan.'}
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
              <button class="btn" style="color: #EF4444;" onclick="updateStatus('${app.row_index}', 'Ditolak')">Tolak</button>
              <button class="btn btn-primary" onclick="updateStatus('${app.row_index}', 'Disetujui')">Setujui</button>
            </div>
          `;
          container.appendChild(card);
        });
      })
      .handleGetAllApprovals({ client_id: currentUser.clientId });
  }

  function handleResetDevice(targetId) {
    if (!confirm(`Yakin ingin reset Device ID untuk ${targetId}?`)) return;
    google.script.run
      .withSuccessHandler(() => { alert('Device berhasil di-reset.'); loadMembersData(); })
      .handleResetDevice({ client_id: currentUser.clientId, target_id_karyawan: targetId });
  }

  function handleDeleteMember(targetId) {
    if (!confirm(`Yakin ingin menghapus ${targetId}?`)) return;
    google.script.run
      .withSuccessHandler(() => { alert('Anggota berhasil dihapus.'); loadMembersData(); })
      .handleDeleteKaryawan({ client_id: currentUser.clientId, target_id: targetId });
  }

  function updateStatus(rowIndex, newStatus) {
    google.script.run
      .withSuccessHandler(() => { loadApprovalsData(); })
      .handleUpdateLeaveStatus({ client_id: currentUser.clientId, row_index: rowIndex, new_status: newStatus });
  }

  // ADMIN: SETTINGS
  function loadOfficeSettings() {
    google.script.run
      .withSuccessHandler(function (response) {
        if (response.status === "success") {
          const config = response.message;
          document.getElementById('set-lat').value = config.lat;
          document.getElementById('set-lng').value = config.lng;
          document.getElementById('set-radius').value = config.radius;
          document.getElementById('set-jam-masuk').value = config.jam_masuk_mulai;
          document.getElementById('set-batas-masuk').value = config.batas_jam_masuk;
          document.getElementById('set-jam-pulang').value = config.jam_pulang_mulai;
          document.getElementById('set-interval').value = config.tl_interval || 30;
          document.getElementById('set-max-tier').value = config.max_tier || 0;
        }
      })
      .handleGetOfficeConfig({ client_id: currentUser.clientId });
  }

  function saveOfficeLocation() {
    const lat = document.getElementById('set-lat').value;
    const lng = document.getElementById('set-lng').value;
    const radius = document.getElementById('set-radius').value;

    google.script.run
      .withSuccessHandler(() => Swal.fire('Berhasil', 'Lokasi kantor diperbarui.', 'success'))
      .handleUpdateLokasi({ client_id: currentUser.clientId, lat: lat, lng: lng, radius: parseInt(radius) });
  }

  function saveWorkHours() {
    const masuk = document.getElementById('set-jam-masuk').value;
    const batas = document.getElementById('set-batas-masuk').value;
    const pulang = document.getElementById('set-jam-pulang').value;
    const interval = document.getElementById('set-interval').value;
    const maxTier = document.getElementById('set-max-tier').value;

    google.script.run
      .withSuccessHandler(() => Swal.fire('Berhasil', 'Jam kerja dan aturan poin diperbarui.', 'success'))
      .handleUpdateJamKerja({
        client_id: currentUser.clientId,
        jam_masuk_mulai: masuk,
        batas_jam_masuk: batas,
        jam_pulang_mulai: pulang,
        tl_interval: parseInt(interval),
        max_tier: parseInt(maxTier)
      });
  }

  // ADMIN: SHIFT & PLOTTING
  let activeShifts = [];
  let activePlotting = {};

  function switchShiftTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (event) event.currentTarget.classList.add('active');
    document.getElementById('shift-tab-calendar').style.display = tab === 'calendar' ? 'block' : 'none';
    document.getElementById('shift-tab-list').style.display = tab === 'list' ? 'block' : 'none';
  }

  function loadShiftData() {
    const monthPicker = document.getElementById('shift-month-picker');
    if (!monthPicker.value) return;
    const [year, month] = monthPicker.value.split('-');

    google.script.run
      .withSuccessHandler(function (response) {
        if (response.success) {
          activeShifts = response.shifts;
          activePlotting = response.plotting;
          renderPlottingCalendar(year, month);
          renderShiftList(activeShifts);
        }
      })
      .getShiftSettings(currentUser.clientId, year, month);
  }

  function renderPlottingCalendar(year, month) {
    const head = document.getElementById('shift-calendar-head');
    const body = document.getElementById('shift-calendar-body');
    const daysInMonth = new Date(year, month, 0).getDate();

    let headHtml = '<tr><th class="sticky-col">Anggota</th>';
    for (let d = 1; d <= daysInMonth; d++) headHtml += `<th>${d}</th>`;
    headHtml += '</tr>';
    head.innerHTML = headHtml;

    google.script.run.withSuccessHandler(members => {
      body.innerHTML = '';
      members.forEach(m => {
        let rowHtml = `<tr data-id="${m.id}"><td class="sticky-col"><strong>${m.nama}</strong><br><small>${m.id}</small></td>`;
        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}-${month.toString().padLeft(2, '0')}-${d.toString().padLeft(2, '0')}`;
          const key = `${dateStr}_${m.id}`;
          const currentShift = activePlotting[key] || "";

          rowHtml += `<td>
            <select class="shift-select" data-key="${key}" data-date="${dateStr}" data-emp="${m.id}">
              <option value="">-</option>
              <option value="LIBUR" ${currentShift === 'LIBUR' ? 'selected' : ''}>OFF</option>
              ${activeShifts.map(s => `<option value="${s.id}" ${currentShift === s.id ? 'selected' : ''}>${s.id}</option>`).join('')}
            </select>
          </td>`;
        }
        rowHtml += '</tr>';
        body.insertAdjacentHTML('beforeend', rowHtml);
      });

    const d = new Date(val);
    return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function formatTime(val) {

  // FACE RECOGNITION LOGIC (WEB)
  let currentTipeAbsen = "Masuk";
  let isFaceModelLoaded = false;

  async function initFaceAI() {
    if (isFaceModelLoaded) return;
    try {
      const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
      await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
      await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
      await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
      isFaceModelLoaded = true;
      console.log("Face API Models Loaded!");
    } catch (e) { console.error("Face AI Init Error:", e); }
  }

  async function handleWebAbsen(tipe) {
    if (!currentSchedule) { alert("Memuat data jadwal..."); return; }
    if (currentSchedule.is_off) { Swal.fire('Libur', 'Hari ini Anda LIBUR. Tidak perlu absen.', 'info'); return; }

    const now = new Date();
    const currentMins = now.getHours() * 60 + now.getMinutes();
    const toM = (t) => { const [h, m] = t.split(':').map(Number); return h * 60 + m; };

    if (tipe === "Masuk") {
      const masM = toM(currentSchedule.masuk);
      const pulM = toM(currentSchedule.pulang);
      const isOvernight = masM > pulM;
      const openGateM = currentSchedule.jam_masuk_mulai ? toM(currentSchedule.jam_masuk_mulai) : (masM - 120);

      if (currentMins < openGateM && !isOvernight) { // Basic check
        Swal.fire('Terlalu Awal', `Absen Masuk baru bisa dilakukan pukul ${currentSchedule.jam_masuk_mulai || currentSchedule.masuk}`, 'warning');
        return;
      }

      // Khusus Overnight: Jika jam 10 pagi mau absen shift jam 10 malam
      if (isOvernight && currentMins < openGateM && currentMins > pulM + 120) {
        Swal.fire('Terlalu Awal', `Absen Masuk baru bisa dilakukan pukul ${currentSchedule.jam_masuk_mulai}`, 'warning');
        return;
      }

      if (!isOvernight && currentMins >= pulM) { Swal.fire('Gagal', `Sudah masuk jam pulang. Silakan hubungi Admin.`, 'error'); return; }
    } else {
      const masM = toM(currentSchedule.masuk);
      const pulM = toM(currentSchedule.pulang);
      const isOvernight = masM > pulM;

      if (isOvernight) {
        // Jika Shift 22:00 - 06:00. Boleh pulang jika jam 06:00 - 12:00
        if (currentMins < pulM) {
          Swal.fire('Belum Waktunya', `Absen Pulang baru dibuka pukul ${currentSchedule.pulang}`, 'warning');
          return;
        }
        if (currentMins > masM) { // Masih di hari pertama
          Swal.fire('Belum Waktunya', `Anda baru saja masuk. Absen pulang dilakukan besok pagi.`, 'warning');
          return;
        }
      } else {
        if (currentMins < pulM) {
          Swal.fire('Belum Waktunya', `Absen Pulang baru dibuka pukul ${currentSchedule.pulang}`, 'warning');
          return;
        }
      }
    }

    currentTipeAbsen = tipe;
    document.getElementById('camera-input').click();
  }

  document.getElementById('camera-input').addEventListener('change', async function (e) {
    const file = e.target.files[0];
    if (!file) return;

    const overlay = document.getElementById('processing-overlay');
    const statusText = document.getElementById('processing-text');
    overlay.style.display = 'flex';

    try {
      statusText.innerText = "Memuat AI...";
      await initFaceAI();
      statusText.innerText = "Membaca Foto...";
      const img = await faceapi.bufferToImage(file);
      statusText.innerText = "Memverifikasi Wajah...";
      const detection = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }))
        .withFaceLandmarks().withFaceDescriptor();

      if (!detection) throw new Error("Wajah tidak terdeteksi jelas.");

      if (currentUser.faceWeb && currentUser.faceWeb.length > 20) {
        const savedDesc = new Float32Array(JSON.parse(currentUser.faceWeb));
        const faceMatcher = new faceapi.FaceMatcher(new faceapi.LabeledFaceDescriptors(currentUser.id, [savedDesc]), 0.6);
        const match = faceMatcher.findBestMatch(detection.descriptor);

        if (match.label === 'unknown') throw new Error("Wajah Tidak Cocok!");

        statusText.innerText = "Mengambil Lokasi...";
        navigator.geolocation.getCurrentPosition(async (pos) => {
          const canvas = document.createElement('canvas');
          canvas.width = 600; canvas.height = 800;
          canvas.getContext('2d').drawImage(img, 0, 0, 600, 800);
          const base64Photo = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

          statusText.innerText = "Mengirim Absen...";
          google.script.run.withSuccessHandler(res => {
            overlay.style.display = 'none';
            if (res.code === 200) Swal.fire('Berhasil!', res.message, 'success').then(() => loadDashboardData());
            else Swal.fire('Gagal', res.message, 'error');
          }).submitAbsenWeb({
            api_token: 'SUPER_SECRET_UMKM001_8xZ2',
            client_id: currentUser.clientId,
            action: 'absen',
            id_karyawan: currentUser.id,
            tipe_absen: currentTipeAbsen,
            lat_long: `${pos.coords.latitude}, ${pos.coords.longitude}`,
            foto_base64: base64Photo
          });
        });
      } else {
        if (confirm("Daftarkan wajah ini?")) {
          const descriptor = JSON.stringify(Array.from(detection.descriptor));
          google.script.run.withSuccessHandler(res => {
            overlay.style.display = 'none';
            if (res.success) { currentUser.faceWeb = descriptor; localStorage.setItem('hadirin_user', JSON.stringify(currentUser)); alert("Berhasil! Silakan absen ulang."); }
          }).registerFaceWeb(currentUser.clientId, currentUser.id, descriptor);
        } else overlay.style.display = 'none';
      }
    } catch (err) { overlay.style.display = 'none'; alert(err.message); }
  });
