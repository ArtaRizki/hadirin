<script>
  // GLOBAL STATE
  let currentUser = null;
  let attendanceChart = null;

  // INITIALIZE
  window.addEventListener('load', () => {
    const savedUser = localStorage.getItem('hadirin_user');
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      showApp();
    }
  });

  // NAVIGATION
  function switchView(viewId) {
    document.querySelectorAll('.content-view').forEach(v => v.style.display = 'none');
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    
    document.getElementById(`view-${viewId}`).style.display = 'block';
    const navItem = document.getElementById(`nav-${viewId}`);
    if (navItem) navItem.classList.add('active');

    // Load data based on view
    if (viewId === 'dashboard') loadDashboardData();
    if (viewId === 'history') loadHistoryData();
    if (viewId === 'members') loadMembers();
    if (viewId === 'approvals') loadApprovals();
    if (viewId === 'ngaji') loadNgajiData();
    if (viewId === 'jadwal') loadJadwalData();
    if (viewId === 'reports') initReportView();
    if (viewId === 'config') loadConfig();
  }

  // AUTH
  function attemptLogin() {
    const clientId = document.getElementById('login-client-id').value;
    const id = document.getElementById('login-id').value;
    const pin = document.getElementById('login-password').value;
    const btn = document.querySelector('#login-screen .btn-primary');
    const err = document.getElementById('login-error');

    if (!clientId || !id) {
      err.innerText = "Lengkapi Kode Instansi dan ID!";
      err.style.display = 'block';
      return;
    }

    if (id.toUpperCase() === 'ADMIN' && !pin) {
       document.getElementById('admin-password-group').style.display = 'block';
       err.innerText = "Masukkan Password Admin";
       err.style.display = 'block';
       return;
    }

    btn.disabled = true;
    btn.innerText = "Memverifikasi...";
    err.style.display = 'none';

    google.script.run
      .withSuccessHandler(res => {
        btn.disabled = false;
        btn.innerText = "Masuk Dashboard";
        if (res.success) {
          currentUser = res.user;
          localStorage.setItem('hadirin_user', JSON.stringify(currentUser));
          showApp();
        } else {
          err.innerText = res.message;
          err.style.display = 'block';
        }
      })
      .loginWeb(clientId, id, pin);
  }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    document.getElementById('user-name').innerText = currentUser.nama;
    document.getElementById('user-id-display').innerText = `ID: ${currentUser.id}`;

    if (currentUser.role === 'ADMIN' || currentUser.role === 'superAdmin') {
      document.getElementById('admin-section').style.display = 'flex';
      document.getElementById('member-action-section').style.display = 'none';
      switchView('dashboard');
    } else {
      document.getElementById('admin-section').style.display = 'none';
      document.getElementById('member-action-section').style.display = 'block';
      switchView('dashboard');
    }
  }

  function logout() {
    localStorage.removeItem('hadirin_user');
    location.reload();
  }

  // DASHBOARD DATA
  function loadDashboardData() {
    google.script.run
      .withSuccessHandler(stats => {
        document.getElementById('stat-present').innerText = stats.present;
        document.getElementById('stat-leave').innerText = stats.leave;
        document.getElementById('stat-late').innerText = stats.late;
        initChart(stats.trendLabels, stats.trendValues);
      })
      .getDashboardStats(currentUser.clientId, currentUser.id);
  }

  function initChart(labels, values) {
    const ctx = document.getElementById('attendanceChart').getContext('2d');
    if (attendanceChart) attendanceChart.destroy();
    attendanceChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Total Kehadiran',
          data: values,
          borderColor: '#10B981',
          backgroundColor: 'rgba(16, 185, 129, 0.1)',
          fill: true,
          tension: 0.4,
          borderWidth: 3,
          pointRadius: 4,
          pointBackgroundColor: '#fff',
          pointBorderColor: '#10B981',
          pointBorderWidth: 2
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, grid: { display: false } },
          x: { grid: { display: false } }
        }
      }
    });
  }

  // HISTORY
  function loadHistoryData() {
    const body = document.getElementById('history-body');
    body.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 20px;">Memuat...</td></tr>';
    google.script.run
      .withSuccessHandler(res => {
        body.innerHTML = '';
        if (res.length === 0) {
          body.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 20px;">Tidak ada riwayat.</td></tr>';
          return;
        }
        res.forEach(row => {
          const tr = document.createElement('tr');
          const dateStr = formatDate(row.waktu);
          const timeStr = formatTime(row.waktu);
          tr.innerHTML = `
            <td>
              <div style="font-weight: 700;">${dateStr}</div>
              <div style="font-size: 0.75rem; color: var(--text-muted);">${timeStr}</div>
            </td>
            <td><span class="badge" style="background: #f1f5f9; color: var(--text-main);">${row.tipe}</span></td>
            <td><span class="badge ${getStatusClass(row.status)}">${row.status}</span></td>
          `;
          body.appendChild(tr);
        });
      })
      .getAttendanceHistory(currentUser.clientId, currentUser.id);
  }

  // ADMIN: MEMBERS
  function loadMembers() {
    const body = document.getElementById('member-body');
    body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px;">Memuat anggota...</td></tr>';
    google.script.run
      .withSuccessHandler(res => {
        body.innerHTML = '';
        res.forEach(m => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><code style="background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-weight: 700;">${m.id}</code></td>
            <td><div style="font-weight: 700;">${m.nama}</div></td>
            <td>${m.bagian}</td>
            <td>${m.no_hp || "-"}</td>
            <td>
              <button class="btn" style="background: #fee2e2; color: #ef4444; padding: 6px 12px; font-size: 0.75rem;" onclick="deleteMember('${m.id}', '${m.nama}')">Hapus</button>
            </td>
          `;
          body.appendChild(tr);
        });
      })
      .handleGetAllAnggota({ api_token: 'kicau-mania', client_id: currentUser.clientId, action: 'get_all_karyawan' });
  }

  function deleteMember(id, nama) {
    Swal.fire({
      title: 'Hapus Anggota?',
      text: `Apakah Anda yakin ingin menghapus ${nama} (${id})?`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#ef4444',
      confirmButtonText: 'Ya, Hapus!',
      cancelButtonText: 'Batal'
    }).then((result) => {
      if (result.isConfirmed) {
        google.script.run
          .withSuccessHandler(res => {
            if (res.status === 'success') {
              Swal.fire('Berhasil', 'Anggota telah dihapus.', 'success');
              loadMembers();
            } else Swal.fire('Gagal', res.message, 'error');
          })
          .handleDeleteKaryawan({ api_token: 'kicau-mania', client_id: currentUser.clientId, action: 'delete_karyawan', target_id: id });
      }
    });
  }

  function openAddMemberModal() { document.getElementById('add-member-modal').style.display = 'flex'; }
  function closeAddMemberModal() { document.getElementById('add-member-modal').style.display = 'none'; }

  function submitAddMember() {
    const payload = {
      api_token: 'kicau-mania',
      client_id: currentUser.clientId,
      action: 'add_karyawan',
      id_karyawan_baru: document.getElementById('add-m-id').value,
      nama_karyawan_baru: document.getElementById('add-m-nama').value,
      divisi_baru: document.getElementById('add-m-divisi').value,
      no_hp: document.getElementById('add-m-hp').value
    };

    if (!payload.id_karyawan_baru || !payload.nama_karyawan_baru) { alert("ID dan Nama wajib diisi!"); return; }

    google.script.run
      .withSuccessHandler(res => {
        if (res.status === "success") {
          Swal.fire('Berhasil', 'Anggota berhasil ditambahkan.', 'success');
          closeAddMemberModal();
          loadMembers();
        } else alert(res.message);
      })
      .handleAddAnggota(payload);
  }

  // ADMIN: APPROVALS
  function loadApprovals() {
    const body = document.getElementById('approval-body');
    body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px;">Memuat data...</td></tr>';
    google.script.run
      .withSuccessHandler(res => {
        body.innerHTML = '';
        if (res.length === 0) {
          body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px;">Tidak ada pengajuan pending.</td></tr>';
          return;
        }
        res.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${formatDate(row.waktu_pengajuan)}</td>
            <td><div style="font-weight:700;">${row.nama}</div><div style="font-size:0.7rem; color:var(--text-muted);">ID: ${row.id_karyawan}</div></td>
            <td><span class="badge" style="background:#fffbeb; color:#f59e0b;">${row.tipe}</span></td>
            <td style="font-size:0.85rem;">${row.alasan}</td>
            <td>
              <button class="btn" style="background:#ecfdf5; color:#10b981; padding:6px 10px;" onclick="updateApproval(${row.row_index}, 'Disetujui')">Setujui</button>
              <button class="btn" style="background:#fef2f2; color:#ef4444; padding:6px 10px;" onclick="updateApproval(${row.row_index}, 'Ditolak')">Tolak</button>
            </td>
          `;
          body.appendChild(tr);
        });
      })
      .handleGetAllApprovals({ api_token: 'kicau-mania', client_id: currentUser.clientId, action: 'get_all_approvals' });
  }

  function updateApproval(rowIndex, newStatus) {
    google.script.run
      .withSuccessHandler(() => {
        Swal.fire('Berhasil', `Status diupdate ke ${newStatus}`, 'success');
        loadApprovals();
      })
      .handleUpdateLeaveStatus({ api_token: 'kicau-mania', client_id: currentUser.clientId, action: 'update_leave_status', row_index: rowIndex, new_status: newStatus });
  }

  // NGAJI DATA
  function loadNgajiData() {
    const body = document.getElementById('ngaji-body');
    body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px;">Memuat...</td></tr>';
    google.script.run
      .withSuccessHandler(res => {
        body.innerHTML = '';
        if (res.status === "success") {
          res.message.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row.waktu}</td><td>${row.id_guru}</td><td>${row.kelompok}</td><td>${row.lokasi}</td><td>${row.materi}</td>`;
            body.appendChild(tr);
          });
        }
      })
      .handleGetLaporanNgaji({ api_token: 'kicau-mania', client_id: currentUser.clientId, action: 'get_laporan_ngaji', id_guru: 'SEMUA' });
  }

  // JADWAL DATA
  function loadJadwalData() {
    const body = document.getElementById('jadwal-body');
    body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px;">Memuat...</td></tr>';
    google.script.run
      .withSuccessHandler(res => {
        body.innerHTML = '';
        if (res.status === "success") {
          res.message.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row.id_kegiatan}</td><td>${row.nama_kegiatan}</td><td>${row.tipe}</td><td>${row.tanggal_waktu}</td><td>-</td>`;
            body.appendChild(tr);
          });
        }
      })
      .handleGetJadwalKegiatan({ api_token: 'kicau-mania', client_id: currentUser.clientId, action: 'get_jadwal_kegiatan' });
  }

  // REPORTS
  function initReportView() {
    const now = new Date();
    document.getElementById('report-month-picker').value = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, '0');
    loadReportData();
  }

  function loadReportData() {
    const picker = document.getElementById('report-month-picker');
    const body = document.getElementById('report-body');
    body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 20px;">Memuat data...</td></tr>';
    const bulanTahun = picker.value.split('-').reverse().join('-');

    google.script.run
      .withSuccessHandler(res => {
        body.innerHTML = '';
        if (res.status === "success") {
          res.message.forEach(row => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${row.waktu}</td><td>${row.id_karyawan}</td><td>${row.nama}</td><td>${row.tipe}</td><td>${row.status}</td>`;
            body.appendChild(tr);
          });
        }
      })
      .handleGetMonthlyReport({ api_token: 'kicau-mania', client_id: currentUser.clientId, action: 'get_monthly_report', bulan_tahun: bulanTahun, id_karyawan_target: "SEMUA" });
  }

  function downloadReport() {
    const picker = document.getElementById('report-month-picker');
    const bulanTahun = picker.value.split('-').reverse().join('-');
    google.script.run
      .withSuccessHandler(res => {
        if (res.status === "success") {
          const ws = XLSX.utils.json_to_sheet(res.message);
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, "Laporan");
          XLSX.writeFile(wb, `Laporan_Hadirin_${picker.value}.xlsx`);
        }
      })
      .handleGetMonthlyReport({ api_token: 'kicau-mania', client_id: currentUser.clientId, action: 'get_monthly_report', bulan_tahun: bulanTahun, id_karyawan_target: "SEMUA" });
  }

  // CONFIG
  function loadConfig() {
    google.script.run
      .withSuccessHandler(res => {
        if (res.code === 200) {
          document.getElementById('set-lat').value = res.message.lat;
          document.getElementById('set-lng').value = res.message.lng;
          document.getElementById('set-radius').value = res.message.radius;
          document.getElementById('set-jam-masuk').value = res.message.jam_masuk_mulai;
          document.getElementById('set-batas-masuk').value = res.message.batas_jam_masuk;
          document.getElementById('set-jam-pulang').value = res.message.jam_pulang_mulai;
        }
      })
      .handleGetOfficeConfig({ api_token: 'kicau-mania', client_id: currentUser.clientId, action: 'get_office_config' });
  }

  function saveOfficeLocation() {
    const payload = {
      api_token: 'kicau-mania',
      client_id: currentUser.clientId,
      action: 'update_lokasi',
      lat: document.getElementById('set-lat').value,
      lng: document.getElementById('set-lng').value,
      radius: document.getElementById('set-radius').value
    };
    google.script.run.withSuccessHandler(() => Swal.fire('Berhasil', 'Lokasi diperbarui', 'success')).handleUpdateLokasi(payload);
  }

  function saveWorkHours() {
    const payload = {
      api_token: 'kicau-mania',
      client_id: currentUser.clientId,
      action: 'update_jam_kerja',
      jam_masuk_mulai: document.getElementById('set-jam-masuk').value,
      batas_jam_masuk: document.getElementById('set-batas-masuk').value,
      jam_pulang_mulai: document.getElementById('set-jam-pulang').value
    };
    google.script.run.withSuccessHandler(() => Swal.fire('Berhasil', 'Jam kerja diperbarui', 'success')).handleUpdateJamKerja(payload);
  }

  // HELPERS
  function formatDate(val) { if (!val) return "-"; const d = new Date(val); return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); }
  function formatTime(val) { if (!val) return "-"; const d = new Date(val); return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }); }
  function getStatusClass(s) { if (s === "Tepat Waktu") return "badge-success"; if (s === "Terlambat") return "badge-danger"; return "badge-warning"; }

  // FACE ABSEN WEB
  async function handleWebAbsen(tipe) {
    document.getElementById('camera-input').click();
    window.currentTipeAbsen = tipe;
  }

  document.getElementById('camera-input').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const overlay = document.getElementById('processing-overlay');
    overlay.style.display = 'flex';
    
    try {
      // Logic Simplified for brevity as per existing structure
      // Ideally should include Face AI logic here if desired
      const reader = new FileReader();
      reader.onload = function(event) {
         const base64 = event.target.result.split(',')[1];
         navigator.geolocation.getCurrentPosition(pos => {
            google.script.run.withSuccessHandler(res => {
              overlay.style.display = 'none';
              if (res.code === 200) Swal.fire('Berhasil', res.message, 'success').then(() => loadDashboardData());
              else Swal.fire('Gagal', res.message, 'error');
            }).submitAbsenWeb({
              api_token: 'kicau-mania',
              client_id: currentUser.clientId,
              action: 'absen',
              id_karyawan: currentUser.id,
              tipe_absen: window.currentTipeAbsen,
              lat_long: `${pos.coords.latitude}, ${pos.coords.longitude}`,
              foto_base64: base64
            });
         });
      };
      reader.readAsDataURL(file);
    } catch (err) { overlay.style.display = 'none'; alert(err.message); }
  });
</script>
